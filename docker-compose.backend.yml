services:
  # Java Jetty Backend
  java-api:
    build:
      context: .
      dockerfile: Dockerfile.java
    container_name: java-api
    environment:
      # Configuration Oracle Database
      DB_URL: "jdbc:oracle:thin:@//host.docker.internal:1521/FREE"
      DB_USER: "SYSTEM"
      DB_PASSWORD: "system"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tunisian-network

  # Python FastAPI Chat API
  fastapi-chat:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: fastapi-chat
    environment:
      JAVA_API_BASE: "http://java-api:8080/api"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8010:8010"
    depends_on:
      - java-api
    networks:
      - tunisian-network

  # Python ML API (Optional - if needed)
  python-ml:
    build:
      context: ./ml
    container_name: python-ml
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    networks:
      - tunisian-network

networks:
  tunisian-network:
    driver: bridge
